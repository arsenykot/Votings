{% extends "abc/with_sidebar.html" %}

{% block title %}
Edit voting
{% endblock %}

{% block content %}
<div class="row">
  <div class="col-md-8 col-lg-6">

    <div class="card">
      <div class="card-header">
        <h5 class="mb-0">Edit voting</h5>
      </div>

      <div class="card-body">

        {% if error %}
          <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label">Title</label>
            <input class="form-control"
                   type="text"
                   name="title"
                   value="{{ voting.name }}"
                   required>
          </div>

          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control"
                      name="description"
                      rows="3"
                      required>{{ voting.description }}</textarea>
          </div>

          <div class="form-check mb-3">
            <input class="form-check-input"
                   type="checkbox"
                   name="multichoice"
                   {% if voting.multichoice %}checked{% endif %}>
            <label class="form-check-label">
              Allow multiple choices
            </label>
          </div>

          <div class="mb-3">
            <label class="form-label">Options (one per line)</label>
            <textarea class="form-control"
                      name="options"
                      rows="6"
                      required>{{ options_text }}</textarea>
          </div>

          <div class="d-flex gap-2">
            <button class="btn btn-primary" type="submit">
              Save
            </button>
            <a href="/votings/view/{{ voting.id }}"
               class="btn btn-secondary">
              Cancel
            </a>
          </div>

        </form>

      </div>
    </div>

  </div>
</div>
{% endblock %}
