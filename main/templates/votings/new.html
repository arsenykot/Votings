{% extends "abc/base.html" %}
{% block content %}
<div style="display: flex; align-items: center; justify-content: center; height: 100%; width: 100%;">
    <form style="width: 400px; padding: 1rem;" id="newform" action="/api/new">
        <h1 class="h3 mb-3 fw-normal">Create a voting</h1>
        {% csrf_token %}
        <div class="form-floating">
            <input type="text" class="form-control" id="floatingName" placeholder="Name" maxlength="48" name="name" required>
            <label for="floatingName">Name</label>
        </div><br>
        <div class="form-floating">
            <textarea class="form-control txtarea" id="floatingDescription" placeholder="Description" maxlength="512" name="description"
            rows=4 form="newform"></textarea>
            <label for="floatingDescription">Description</label>
        </div><br>
        <div class="form-floating">
            <input type="text" class="form-control top" id="floatingOption1" placeholder="Option 1" maxlength="48" name="option1" required>
            <label for="floatingOption1">Option 1</label>
        </div>
        <div class="form-floating">
            <input type="text" class="form-control bottom" id="floatingOption2" placeholder="Option 2" maxlength="48" name="option2" required>
            <label for="floatingOption2">Option 2</label> 
        </div>
        <div class="form-check text-start my-3">
            <input class="form-check-input close" type="radio" id="close1" name="close" checked=true value="auto">
            <label class="form-check-label" for="close2">Automatically close the voting</label>
            <br>
            <input class="form-check-input close" type="radio" id="close2" name="close" value="manual"> 
            <label class="form-check-label" for="close2">Close the voting manually</label>
        </div>
        <div class="form-small" id="datetimeForm">
            <input class="form-control top datetime" type="date" id="datetime1" name="date">
            <input class="form-control bottom datetime" type="time" id="datetime2" name = "time">
        </div>
        <label for="datetimeForm">Choose automatic close date</label>
        <br><br>
        <i>By creating any content on this website, you agree with the <a href="/tos">Terms of Service</a>.</i>
        <br><br>
        <button class="btn btn-primary w-100 py-2" type="submit" data-spinner-text="Creating...">Create</button>
        <p class="mt-5 mb-3 text-body-secondary">© 2025</p> 
    </form>
    <script>
        document.getElementById("newform").onsubmit = buildAjaxFormHandler(function(resp){
            if(resp.status == 200){
                spawnToast("success", "info-circle-fill", "Voting successfully created!")
            }
            else{
                switch(resp.content){
                    case "UNAUTHORIZED":
                    errorToast(false, "Authorization failure. Try refreshing the page.");
                    break;
                    case "BADREQUEST":
                    errorToast(false, "Invalid data specified.");
                    break;
                    case "BADDATE":
                    errorToast(false, "Invalid date format.");
                    break;
                    default:
                    errorToast(false, "Unexpected error. Check console for more info.");
                    console.error(resp);
                    break;
                }
            }
        });
        const radio1 = document.getElementById("close1");
        const datetime1 = document.getElementById("datetime1");
        const radio2 = document.getElementById("close2");
        const datetime2 = document.getElementById("datetime2");
        function radioUpdate(e){
            datetime1.disabled=!document.getElementById("close1").checked;
            datetime2.disabled=datetime1.disabled;
        }
        radio1.addEventListener("input", radioUpdate);
        radio2.addEventListener("input", radioUpdate);
    </script>
</div>
{% endblock %}
